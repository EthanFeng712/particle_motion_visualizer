<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>质点运动轨迹可视化 | Particle Motion Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .input-field { transition: all 0.3s ease; }
        .input-field:focus { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4); }
        .trajectory-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s ease-out forwards; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- 标题区域 -->
        <div class="text-center mb-8 text-white">
            <h1 class="text-4xl md:text-5xl font-bold mb-2">🚀 质点运动轨迹可视化</h1>
            <p class="text-lg opacity-90">Particle Trajectory Visualizer: r(t) = x(t)i + y(t)j + z(t)k</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧控制面板 -->
            <div class="glass-panel rounded-2xl p-6 shadow-2xl lg:col-span-1">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <span class="mr-2">⚙️</span> 参数设置
                </h2>

                <!-- 预设选择 -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">预设运动模式</label>
                    <select id="preset" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent bg-white" onchange="loadPreset()">
                        <option value="">-- 选择预设 --</option>
                        <option value="helix">螺旋线 (Helix)</option>
                        <option value="projectile">抛体运动 (Projectile)</option>
                        <option value="lissajous">利萨如曲线 (Lissajous)</option>
                        <option value="torus">环面螺旋 (Torus Knot)</option>
                        <option value="sphere">球面螺旋 (Spherical)</option>
                    </select>
                </div>

                <!-- 方程输入 -->
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">x(t) =</label>
                        <input type="text" id="xFunc" class="input-field w-full p-3 border border-gray-300 rounded-lg font-mono text-sm" value="cos(t)" placeholder="例如: cos(t)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">y(t) =</label>
                        <input type="text" id="yFunc" class="input-field w-full p-3 border border-gray-300 rounded-lg font-mono text-sm" value="sin(t)" placeholder="例如: sin(t)">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">z(t) =</label>
                        <input type="text" id="zFunc" class="input-field w-full p-3 border border-gray-300 rounded-lg font-mono text-sm" value="0.2*t" placeholder="例如: 0.2*t">
                    </div>
                </div>

                <!-- 时间范围 -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">起始时间</label>
                        <input type="number" id="tStart" class="w-full p-3 border border-gray-300 rounded-lg" value="0" step="0.1">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">结束时间</label>
                        <input type="number" id="tEnd" class="w-full p-3 border border-gray-300 rounded-lg" value="25.13" step="0.1">
                    </div>
                </div>

                <!-- 采样点数 -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">采样点数: <span id="pointsValue">1000</span></label>
                    <input type="range" id="numPoints" class="w-full" min="100" max="5000" value="1000" step="100" oninput="document.getElementById('pointsValue').textContent=this.value">
                </div>

                <!-- 可视化选项 -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">着色方式</label>
                    <div class="flex gap-2">
                        <button onclick="setColorMode('time')" class="flex-1 py-2 px-4 rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 transition text-sm font-medium" id="btn-time">时间</button>
                        <button onclick="setColorMode('velocity')" class="flex-1 py-2 px-4 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition text-sm font-medium" id="btn-velocity">速度</button>
                        <button onclick="setColorMode('acceleration')" class="flex-1 py-2 px-4 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition text-sm font-medium" id="btn-acceleration">加速度</button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="showVectors" class="w-4 h-4 text-purple-600 rounded" checked>
                        <span class="text-sm font-medium text-gray-700">显示速度/加速度矢量</span>
                    </label>
                </div>

                <!-- 操作按钮 -->
                <div class="space-y-3">
                    <button onclick="calculateTrajectory()" class="btn-primary w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg flex items-center justify-center">
                        <span class="mr-2">🎨</span> 生成轨迹
                    </button>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="exportData()" class="py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition flex items-center justify-center">
                            <span class="mr-1">💾</span> 导出CSV
                        </button>
                        <button onclick="showAnalysis()" class="py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition flex items-center justify-center">
                            <span class="mr-1">📊</span> 分析
                        </button>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div id="stats" class="mt-6 p-4 bg-gray-50 rounded-xl text-sm font-mono text-gray-600 hidden">
                    <h3 class="font-bold text-gray-800 mb-2">📈 运动统计</h3>
                    <div id="statsContent"></div>
                </div>
            </div>

            <!-- 右侧可视化区域 -->
            <div class="glass-panel rounded-2xl p-6 shadow-2xl lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">3D 轨迹视图</h2>
                    <div class="flex gap-2">
                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                            <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>起点
                        </span>
                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">
                            <span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span>终点
                        </span>
                    </div>
                </div>
                <div id="plot3d" class="w-full h-[500px] rounded-xl overflow-hidden bg-white"></div>
                
                <!-- 分析图表容器 -->
                <div id="analysisPanel" class="hidden mt-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">运动学分析</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div id="plotVelocity" class="h-[300px] bg-white rounded-xl p-2"></div>
                        <div id="plotAcceleration" class="h-[300px] bg-white rounded-xl p-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="mt-8 glass-panel rounded-2xl p-6 shadow-xl">
            <h3 class="text-lg font-bold text-gray-800 mb-3">📖 使用说明</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-gray-600">
                <div class="p-4 bg-white/50 rounded-lg">
                    <strong class="text-purple-700">支持的函数:</strong><br>
                    sin, cos, tan, exp, log, sqrt, abs, pi, e<br>
                    运算符: + - * / ^
                </div>
                <div class="p-4 bg-white/50 rounded-lg">
                    <strong class="text-purple-700">示例方程:</strong><br>
                    螺旋线: cos(t), sin(t), 0.1*t<br>
                    波浪: t, sin(t), cos(t)
                </div>
                <div class="p-4 bg-white/50 rounded-lg">
                    <strong class="text-purple-700">操作提示:</strong><br>
                    • 鼠标拖拽旋转3D视图<br>
                    • 滚轮缩放<br>
                    • 双击重置视角
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;
        let colorMode = 'time';

        const presets = {
            helix: { x: 'cos(t)', y: 'sin(t)', z: '0.2*t', tStart: 0, tEnd: 25.13 },
            projectile: { x: '20*cos(pi/4)*cos(pi/6)*t', y: '20*cos(pi/4)*sin(pi/6)*t', z: '20*sin(pi/4)*t - 4.9*t^2', tStart: 0, tEnd: 2.9 },
            lissajous: { x: '2*sin(3*t + pi/4)', y: '3*sin(2*t)', z: '1.5*sin(t + pi/2)', tStart: 0, tEnd: 12.57 },
            torus: { x: '(3 + cos(3*t))*cos(2*t)', y: '(3 + cos(3*t))*sin(2*t)', z: 'sin(3*t)', tStart: 0, tEnd: 6.28 },
            sphere: { x: 'sin(t)*cos(3*t)', y: 'sin(t)*sin(3*t)', z: 'cos(t)', tStart: 0, tEnd: 12.57 }
        };

        function loadPreset() {
            const preset = document.getElementById('preset').value;
            if (presets[preset]) {
                const p = presets[preset];
                document.getElementById('xFunc').value = p.x;
                document.getElementById('yFunc').value = p.y;
                document.getElementById('zFunc').value = p.z;
                document.getElementById('tStart').value = p.tStart;
                document.getElementById('tEnd').value = p.tEnd;
            }
        }

        function setColorMode(mode) {
            colorMode = mode;
            ['time', 'velocity', 'acceleration'].forEach(m => {
                const btn = document.getElementById('btn-' + m);
                if (m === mode) {
                    btn.className = 'flex-1 py-2 px-4 rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 transition text-sm font-medium';
                } else {
                    btn.className = 'flex-1 py-2 px-4 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition text-sm font-medium';
                }
            });
            if (currentData) calculateTrajectory();
        }

        function parseFunction(expr) {
            return (t) => {
                try {
                    const scope = { t: t, pi: Math.PI, e: Math.E };
                    return math.evaluate(expr, scope);
                } catch (e) {
                    throw new Error(`函数解析错误: ${expr}`);
                }
            };
        }

        function calculateTrajectory() {
            try {
                const xExpr = document.getElementById('xFunc').value;
                const yExpr = document.getElementById('yFunc').value;
                const zExpr = document.getElementById('zFunc').value;
                const tStart = parseFloat(document.getElementById('tStart').value);
                const tEnd = parseFloat(document.getElementById('tEnd').value);
                const numPoints = parseInt(document.getElementById('numPoints').value);
                const showVectors = document.getElementById('showVectors').checked;

                const xFunc = parseFunction(xExpr);
                const yFunc = parseFunction(yExpr);
                const zFunc = parseFunction(zExpr);

                // 生成数据
                const t = [];
                const x = [], y = [], z = [];
                const dt = (tEnd - tStart) / (numPoints - 1);

                for (let i = 0; i < numPoints; i++) {
                    const ti = tStart + i * dt;
                    t.push(ti);
                    x.push(xFunc(ti));
                    y.push(yFunc(ti));
                    z.push(zFunc(ti));
                }

                // 计算速度和加速度（数值微分）
                const vx = numericalDiff(x, dt);
                const vy = numericalDiff(y, dt);
                const vz = numericalDiff(z, dt);
                const vMag = vx.map((v, i) => Math.sqrt(v**2 + vy[i]**2 + vz[i]**2));

                const ax = numericalDiff(vx, dt);
                const ay = numericalDiff(vy, dt);
                const az = numericalDiff(vz, dt);
                const aMag = ax.map((a, i) => Math.sqrt(a**2 + ay[i]**2 + az[i]**2));

                currentData = { t, x, y, z, vx, vy, vz, vMag, ax, ay, az, aMag };

                plot3D(showVectors);
                updateStats();

            } catch (error) {
                alert('计算错误: ' + error.message);
            }
        }

        function numericalDiff(arr, dt) {
            const result = [];
            for (let i = 0; i < arr.length; i++) {
                if (i === 0) {
                    result.push((arr[i+1] - arr[i]) / dt);
                } else if (i === arr.length - 1) {
                    result.push((arr[i] - arr[i-1]) / dt);
                } else {
                    result.push((arr[i+1] - arr[i-1]) / (2 * dt));
                }
            }
            return result;
        }

        function plot3D(showVectors) {
            if (!currentData) return;

            const { t, x, y, z, vx, vy, vz, vMag, ax, ay, az, aMag } = currentData;

            let colors;
            let colorbarTitle;
            if (colorMode === 'time') {
                colors = t;
                colorbarTitle = 'Time (s)';
            } else if (colorMode === 'velocity') {
                colors = vMag;
                colorbarTitle = 'Velocity (m/s)';
            } else {
                colors = aMag;
                colorbarTitle = 'Acceleration (m/s²)';
            }

            const trace1 = {
                type: 'scatter3d',
                mode: 'lines+markers',
                x: x,
                y: y,
                z: z,
                line: {
                    color: colors,
                    colorscale: 'Viridis',
                    width: 6
                },
                marker: {
                    size: 3,
                    color: colors,
                    colorscale: 'Viridis',
                    showscale: true,
                    colorbar: { title: colorbarTitle }
                },
                name: 'Trajectory'
            };

            const trace2 = {
                type: 'scatter3d',
                mode: 'markers',
                x: [x[0]],
                y: [y[0]],
                z: [z[0]],
                marker: { size: 8, color: 'green', symbol: 'diamond' },
                name: 'Start'
            };

            const trace3 = {
                type: 'scatter3d',
                mode: 'markers',
                x: [x[x.length-1]],
                y: [y[y.length-1]],
                z: [z[z.length-1]],
                marker: { size: 8, color: 'red', symbol: 'square' },
                name: 'End'
            };

            const traces = [trace1, trace2, trace3];

            // 添加矢量
            if (showVectors) {
                const step = Math.floor(x.length / 15);
                const vScale = 0.1;
                const aScale = 0.05;

                for (let i = 0; i < x.length; i += step) {
                    // 速度矢量
                    traces.push({
                        type: 'scatter3d',
                        mode: 'lines',
                        x: [x[i], x[i] + vx[i]*vScale],
                        y: [y[i], y[i] + vy[i]*vScale],
                        z: [z[i], z[i] + vz[i]*vScale],
                        line: { color: 'blue', width: 3 },
                        showlegend: i === 0,
                        name: 'Velocity'
                    });

                    // 加速度矢量
                    traces.push({
                        type: 'scatter3d',
                        mode: 'lines',
                        x: [x[i], x[i] + ax[i]*aScale],
                        y: [y[i], y[i] + ay[i]*aScale],
                        z: [z[i], z[i] + az[i]*aScale],
                        line: { color: 'red', width: 3 },
                        showlegend: i === 0,
                        name: 'Acceleration'
                    });
                }
            }

            const layout = {
                scene: {
                    xaxis: { title: 'X (m)' },
                    yaxis: { title: 'Y (m)' },
                    zaxis: { title: 'Z (m)' },
                    aspectmode: 'data'
                },
                margin: { l: 0, r: 0, t: 30, b: 0 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                showlegend: true,
                legend: { x: 0, y: 1 }
            };

            Plotly.newPlot('plot3d', traces, layout, { responsive: true });
        }

        function updateStats() {
            if (!currentData) return;
            const { vMag, aMag, t } = currentData;

            const maxV = Math.max(...vMag).toFixed(2);
            const minV = Math.min(...vMag).toFixed(2);
            const maxA = Math.max(...aMag).toFixed(2);
            const avgV = (vMag.reduce((a,b) => a+b, 0) / vMag.length).toFixed(2);

            // 计算轨迹长度
            let length = 0;
            for (let i = 1; i < currentData.x.length; i++) {
                const dx = currentData.x[i] - currentData.x[i-1];
                const dy = currentData.y[i] - currentData.y[i-1];
                const dz = currentData.z[i] - currentData.z[i-1];
                length += Math.sqrt(dx*dx + dy*dy + dz*dz);
            }

            const statsHtml = `
                <div class="grid grid-cols-2 gap-2">
                    <div>最大速度:</div><div class="text-right font-bold">${maxV} m/s</div>
                    <div>最小速度:</div><div class="text-right font-bold">${minV} m/s</div>
                    <div>平均速度:</div><div class="text-right font-bold">${avgV} m/s</div>
                    <div>最大加速度:</div><div class="text-right font-bold">${maxA} m/s²</div>
                    <div>轨迹长度:</div><div class="text-right font-bold">${length.toFixed(2)} m</div>
                    <div>持续时间:</div><div class="text-right font-bold">${(t[t.length-1]-t[0]).toFixed(2)} s</div>
                </div>
            `;

            document.getElementById('statsContent').innerHTML = statsHtml;
            document.getElementById('stats').classList.remove('hidden');
        }

        function showAnalysis() {
            if (!currentData) {
                alert('请先生成轨迹');
                return;
            }

            document.getElementById('analysisPanel').classList.remove('hidden');
            const { t, vx, vy, vz, vMag, ax, ay, az, aMag } = currentData;

            // 速度图
            Plotly.newPlot('plotVelocity', [
                { x: t, y: vx, name: 'vx', line: { color: '#1f77b4' } },
                { x: t, y: vy, name: 'vy', line: { color: '#ff7f0e' } },
                { x: t, y: vz, name: 'vz', line: { color: '#2ca02c' } },
                { x: t, y: vMag, name: '|v|', line: { color: 'black', dash: 'dash' } }
            ], {
                title: '速度分量 vs 时间',
                xaxis: { title: 'Time (s)' },
                yaxis: { title: 'Velocity (m/s)' },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            });

            // 加速度图
            Plotly.newPlot('plotAcceleration', [
                { x: t, y: ax, name: 'ax', line: { color: '#1f77b4' } },
                { x: t, y: ay, name: 'ay', line: { color: '#ff7f0e' } },
                { x: t, y: az, name: 'az', line: { color: '#2ca02c' } },
                { x: t, y: aMag, name: '|a|', line: { color: 'black', dash: 'dash' } }
            ], {
                title: '加速度分量 vs 时间',
                xaxis: { title: 'Time (s)' },
                yaxis: { title: 'Acceleration (m/s²)' },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            });
        }

        function exportData() {
            if (!currentData) {
                alert('没有可导出的数据');
                return;
            }

            const { t, x, y, z, vx, vy, vz, vMag, ax, ay, az, aMag } = currentData;
            let csv = 't,x,y,z,vx,vy,vz,v_mag,ax,ay,az,a_mag\n';

            for (let i = 0; i < t.length; i++) {
                csv += `${t[i]},${x[i]},${y[i]},${z[i]},${vx[i]},${vy[i]},${vz[i]},${vMag[i]},${ax[i]},${ay[i]},${az[i]},${aMag[i]}\n`;
            }

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'trajectory_data.csv';
            a.click();
        }

        // 初始化
        window.onload = () => {
            calculateTrajectory();
        };
    </script>
</body>
</html>
