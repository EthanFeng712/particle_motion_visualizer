<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>质点运动轨迹分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .metric-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border-left: 3px solid #3b82f6;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: rgba(71, 85, 105, 0.5);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.8);
        }
        #trajectoryPlot, #velocityPlot, #accelerationPlot {
            width: 100%;
            height: 100%;
        }
        .preset-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .preset-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            color: #60a5fa;
        }
    </style>
<base target="_blank">
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-50 border-b border-slate-700/50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl">
                    r(t)
                </div>
                <div>
                    <h1 class="text-2xl font-bold gradient-text">质点运动轨迹分析</h1>
                    <p class="text-xs text-slate-400">Particle Motion Trajectory Analysis</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="resetView()" class="btn-secondary px-4 py-2 rounded-lg text-sm font-medium text-slate-300">
                    重置视图
                </button>
                <button onclick="exportData()" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium text-white shadow-lg">
                    导出数据
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Panel: Controls -->
        <div class="lg:col-span-4 space-y-6">
            
            <!-- Input Section -->
            <div class="glass-panel rounded-2xl p-6 space-y-4">
                <h2 class="text-lg font-semibold text-slate-200 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    位置矢量 r(t)
                </h2>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">x(t) 分量</label>
                        <input type="text" id="inputX" value="cos(t)" class="input-field w-full px-3 py-2 rounded-lg text-sm font-mono text-blue-300" placeholder="例如: cos(t)">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">y(t) 分量</label>
                        <input type="text" id="inputY" value="sin(t)" class="input-field w-full px-3 py-2 rounded-lg text-sm font-mono text-green-300" placeholder="例如: sin(t)">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">z(t) 分量</label>
                        <input type="text" id="inputZ" value="0.1*t" class="input-field w-full px-3 py-2 rounded-lg text-sm font-mono text-purple-300" placeholder="例如: 0.1*t">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">时间范围 [0, T]</label>
                        <input type="number" id="inputT" value="20" step="0.1" class="input-field w-full px-3 py-2 rounded-lg text-sm text-slate-200">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">采样点数</label>
                        <input type="number" id="inputN" value="500" step="50" class="input-field w-full px-3 py-2 rounded-lg text-sm text-slate-200">
                    </div>
                </div>

                <button onclick="calculateTrajectory()" class="btn-primary w-full py-3 rounded-lg font-semibold text-white shadow-lg mt-2 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    生成轨迹
                </button>
            </div>

            <!-- Presets -->
            <div class="glass-panel rounded-2xl p-6">
                <h3 class="text-sm font-semibold text-slate-300 mb-3">预设轨迹</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="loadPreset('helix')" class="preset-btn px-3 py-2 rounded-lg text-xs font-medium text-slate-300">螺旋线</button>
                    <button onclick="loadPreset('lissajous')" class="preset-btn px-3 py-2 rounded-lg text-xs font-medium text-slate-300">利萨如曲线</button>
                    <button onclick="loadPreset('torus')" class="preset-btn px-3 py-2 rounded-lg text-xs font-medium text-slate-300">环面螺旋</button>
                    <button onclick="loadPreset('rose')" class="preset-btn px-3 py-2 rounded-lg text-xs font-medium text-slate-300">球面玫瑰线</button>
                    <button onclick="loadPreset('damped')" class="preset-btn px-3 py-2 rounded-lg text-xs font-medium text-slate-300">阻尼振动</button>
                    <button onclick="loadPreset('chaos')" class="preset-btn px-3 py-2 rounded-lg text-xs font-medium text-slate-300">混沌轨迹</button>
                </div>
            </div>

            <!-- Real-time Metrics -->
            <div class="glass-panel rounded-2xl p-6 space-y-3">
                <h3 class="text-sm font-semibold text-slate-300 mb-2">实时参数</h3>
                <div class="metric-card p-3 rounded-lg">
                    <div class="text-xs text-slate-400">速度大小 |v|</div>
                    <div class="text-lg font-mono font-bold text-blue-400" id="metricVelocity">0.00</div>
                </div>
                <div class="metric-card p-3 rounded-lg border-l-purple-500">
                    <div class="text-xs text-slate-400">加速度大小 |a|</div>
                    <div class="text-lg font-mono font-bold text-purple-400" id="metricAcceleration">0.00</div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="bg-slate-800/50 p-2 rounded-lg">
                        <div class="text-[10px] text-slate-500">当前时间 t</div>
                        <div class="text-sm font-mono text-slate-300" id="metricTime">0.00</div>
                    </div>
                    <div class="bg-slate-800/50 p-2 rounded-lg">
                        <div class="text-[10px] text-slate-500">路径长度 s</div>
                        <div class="text-sm font-mono text-slate-300" id="metricPath">0.00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Visualization -->
        <div class="lg:col-span-8 space-y-6">
            
            <!-- 3D Trajectory -->
            <div class="glass-panel rounded-2xl p-1 h-[500px] relative">
                <div class="absolute top-4 left-4 z-10 bg-slate-900/80 backdrop-blur px-3 py-1 rounded-full text-xs font-medium text-slate-300 border border-slate-700">
                    3D 运动轨迹
                </div>
                <div id="trajectoryPlot"></div>
            </div>

            <!-- Analysis Charts -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-panel rounded-2xl p-1 h-[300px]">
                    <div class="absolute top-4 left-4 z-10 bg-slate-900/80 backdrop-blur px-3 py-1 rounded-full text-xs font-medium text-slate-300 border border-slate-700">
                        速度分量
                    </div>
                    <div id="velocityPlot"></div>
                </div>
                <div class="glass-panel rounded-2xl p-1 h-[300px]">
                    <div class="absolute top-4 left-4 z-10 bg-slate-900/80 backdrop-blur px-3 py-1 rounded-full text-xs font-medium text-slate-300 border border-slate-700">
                        加速度分量
                    </div>
                    <div id="accelerationPlot"></div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="glass-panel rounded-2xl p-6 overflow-hidden">
                <h3 class="text-sm font-semibold text-slate-300 mb-4">关键帧数据</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs text-left">
                        <thead class="text-slate-400 border-b border-slate-700">
                            <tr>
                                <th class="pb-2 font-medium">时间 t</th>
                                <th class="pb-2 font-medium">位置 x</th>
                                <th class="pb-2 font-medium">位置 y</th>
                                <th class="pb-2 font-medium">位置 z</th>
                                <th class="pb-2 font-medium">速度 |v|</th>
                                <th class="pb-2 font-medium">加速度 |a|</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="text-slate-300 font-mono">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Global variables
        let trajectoryData = null;
        let animationFrame = null;
        let currentTimeIndex = 0;
        let isPlaying = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            calculateTrajectory();
        });

        // Parse mathematical expressions
        function parseExpression(expr, t) {
            try {
                const scope = { t: t, sin: Math.sin, cos: Math.cos, tan: Math.tan, 
                               exp: Math.exp, log: Math.log, sqrt: Math.sqrt, 
                               PI: Math.PI, E: Math.E, abs: Math.abs };
                return math.evaluate(expr, scope);
            } catch (e) {
                console.error('Parse error:', e);
                return 0;
            }
        }

        // Numerical differentiation
        function derivative(func, t, dt = 0.001) {
            return (func(t + dt) - func(t - dt)) / (2 * dt);
        }

        // Second derivative
        function secondDerivative(func, t, dt = 0.001) {
            return (func(t + dt) - 2*func(t) + func(t - dt)) / (dt * dt);
        }

        // Calculate trajectory
        function calculateTrajectory() {
            const xExpr = document.getElementById('inputX').value;
            const yExpr = document.getElementById('inputY').value;
            const zExpr = document.getElementById('inputZ').value;
            const T = parseFloat(document.getElementById('inputT').value);
            const N = parseInt(document.getElementById('inputN').value);

            const dt = T / N;
            const tValues = [];
            const xValues = [], yValues = [], zValues = [];
            const vxValues = [], vyValues = [], vzValues = [];
            const axValues = [], ayValues = [], azValues = [];
            const vMagValues = [], aMagValues = [];

            let pathLength = 0;
            let prevX = 0, prevY = 0, prevZ = 0;

            // Define functions
            const xFunc = (t) => parseExpression(xExpr, t);
            const yFunc = (t) => parseExpression(yExpr, t);
            const zFunc = (t) => parseExpression(zExpr, t);

            for (let i = 0; i <= N; i++) {
                const t = i * dt;
                tValues.push(t);

                const x = xFunc(t);
                const y = yFunc(t);
                const z = zFunc(t);
                xValues.push(x);
                yValues.push(y);
                zValues.push(z);

                // Velocity (numerical derivative)
                const vx = derivative(xFunc, t, dt);
                const vy = derivative(yFunc, t, dt);
                const vz = derivative(zFunc, t, dt);
                vxValues.push(vx);
                vyValues.push(vy);
                vzValues.push(vz);

                const vMag = Math.sqrt(vx*vx + vy*vy + vz*vz);
                vMagValues.push(vMag);

                // Acceleration (numerical derivative)
                const ax = secondDerivative(xFunc, t, dt);
                const ay = secondDerivative(yFunc, t, dt);
                const az = secondDerivative(zFunc, t, dt);
                axValues.push(ax);
                ayValues.push(ay);
                azValues.push(az);

                const aMag = Math.sqrt(ax*ax + ay*ay + az*az);
                aMagValues.push(aMag);

                // Path length
                if (i > 0) {
                    const dx = x - prevX;
                    const dy = y - prevY;
                    const dz = z - prevZ;
                    pathLength += Math.sqrt(dx*dx + dy*dy + dz*dz);
                }
                prevX = x;
                prevY = y;
                prevZ = z;
            }

            trajectoryData = {
                t: tValues,
                x: xValues,
                y: yValues,
                z: zValues,
                vx: vxValues,
                vy: vyValues,
                vz: vzValues,
                ax: axValues,
                ay: ayValues,
                az: azValues,
                vMag: vMagValues,
                aMag: aMagValues,
                pathLength: pathLength
            };

            updatePlots();
            updateTable();
            startAnimation();
        }

        // Update all plots
        function updatePlots() {
            if (!trajectoryData) return;

            const { t, x, y, z, vx, vy, vz, ax, ay, az, vMag, aMag } = trajectoryData;

            // 3D Trajectory
            const trace3D = {
                type: 'scatter3d',
                mode: 'lines',
                x: x,
                y: y,
                z: z,
                line: {
                    color: t,
                    colorscale: 'Viridis',
                    width: 6
                },
                marker: {
                    size: 2,
                    color: t,
                    colorscale: 'Viridis'
                },
                name: '轨迹'
            };

            const currentPoint = {
                type: 'scatter3d',
                mode: 'markers',
                x: [x[0]],
                y: [y[0]],
                z: [z[0]],
                marker: {
                    size: 8,
                    color: '#ef4444',
                    symbol: 'diamond'
                },
                name: '当前位置'
            };

            const layout3D = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 0, r: 0, t: 0, b: 0 },
                scene: {
                    xaxis: { title: 'X', gridcolor: '#334155', color: '#94a3b8' },
                    yaxis: { title: 'Y', gridcolor: '#334155', color: '#94a3b8' },
                    zaxis: { title: 'Z', gridcolor: '#334155', color: '#94a3b8' },
                    bgcolor: 'rgba(0,0,0,0)',
                    camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } }
                },
                showlegend: false,
                font: { color: '#e2e8f0' }
            };

            Plotly.newPlot('trajectoryPlot', [trace3D, currentPoint], layout3D, { responsive: true });

            // Velocity Plot
            const traceVx = { x: t, y: vx, mode: 'lines', name: 'vx', line: { color: '#60a5fa', width: 2 } };
            const traceVy = { x: t, y: vy, mode: 'lines', name: 'vy', line: { color: '#34d399', width: 2 } };
            const traceVz = { x: t, y: vz, mode: 'lines', name: 'vz', line: { color: '#a78bfa', width: 2 } };
            const traceVMag = { x: t, y: vMag, mode: 'lines', name: '|v|', line: { color: '#f472b6', width: 3, dash: 'dash' } };

            const layoutV = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 40, r: 20, t: 40, b: 40 },
                xaxis: { title: '时间 t', gridcolor: '#334155', color: '#94a3b8' },
                yaxis: { title: '速度', gridcolor: '#334155', color: '#94a3b8' },
                legend: { x: 0, y: 1, bgcolor: 'rgba(30,41,59,0.8)', font: { color: '#e2e8f0' } },
                font: { color: '#e2e8f0' }
            };

            Plotly.newPlot('velocityPlot', [traceVx, traceVy, traceVz, traceVMag], layoutV, { responsive: true });

            // Acceleration Plot
            const traceAx = { x: t, y: ax, mode: 'lines', name: 'ax', line: { color: '#60a5fa', width: 2 } };
            const traceAy = { x: t, y: ay, mode: 'lines', name: 'ay', line: { color: '#34d399', width: 2 } };
            const traceAz = { x: t, y: az, mode: 'lines', name: 'az', line: { color: '#a78bfa', width: 2 } };
            const traceAMag = { x: t, y: aMag, mode: 'lines', name: '|a|', line: { color: '#f472b6', width: 3, dash: 'dash' } };

            const layoutA = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 40, r: 20, t: 40, b: 40 },
                xaxis: { title: '时间 t', gridcolor: '#334155', color: '#94a3b8' },
                yaxis: { title: '加速度', gridcolor: '#334155', color: '#94a3b8' },
                legend: { x: 0, y: 1, bgcolor: 'rgba(30,41,59,0.8)', font: { color: '#e2e8f0' } },
                font: { color: '#e2e8f0' }
            };

            Plotly.newPlot('accelerationPlot', [traceAx, traceAy, traceAz, traceAMag], layoutA, { responsive: true });
        }

        // Animation loop
        function startAnimation() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            currentTimeIndex = 0;
            isPlaying = true;
            animate();
        }

        function animate() {
            if (!trajectoryData || !isPlaying) return;

            const { t, x, y, z, vMag, aMag } = trajectoryData;
            
            // Update current point in 3D plot
            Plotly.animate('trajectoryPlot', {
                data: [{ x: [x[currentTimeIndex]], y: [y[currentTimeIndex]], z: [z[currentTimeIndex]] }],
                traces: [1],
                layout: {}
            }, {
                transition: { duration: 0 },
                frame: { duration: 0, redraw: false }
            });

            // Update metrics
            document.getElementById('metricTime').textContent = t[currentTimeIndex].toFixed(2);
            document.getElementById('metricVelocity').textContent = vMag[currentTimeIndex].toFixed(3);
            document.getElementById('metricAcceleration').textContent = aMag[currentTimeIndex].toFixed(3);
            
            // Calculate path length up to current point
            let currentPath = 0;
            for (let i = 1; i <= currentTimeIndex; i++) {
                const dx = x[i] - x[i-1];
                const dy = y[i] - y[i-1];
                const dz = z[i] - z[i-1];
                currentPath += Math.sqrt(dx*dx + dy*dy + dz*dz);
            }
            document.getElementById('metricPath').textContent = currentPath.toFixed(2);

            currentTimeIndex++;
            if (currentTimeIndex >= t.length) {
                currentTimeIndex = 0;
            }

            animationFrame = requestAnimationFrame(() => {
                setTimeout(animate, 20); // Control animation speed
            });
        }

        // Update data table
        function updateTable() {
            if (!trajectoryData) return;
            
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            
            const { t, x, y, z, vMag, aMag } = trajectoryData;
            const step = Math.floor(t.length / 10); // Show 10 rows
            
            for (let i = 0; i < t.length; i += step) {
                const row = document.createElement('tr');
                row.className = 'border-b border-slate-800 hover:bg-slate-800/50 transition-colors';
                row.innerHTML = `
                    <td class="py-2 text-blue-400">${t[i].toFixed(2)}</td>
                    <td class="py-2">${x[i].toFixed(3)}</td>
                    <td class="py-2">${y[i].toFixed(3)}</td>
                    <td class="py-2">${z[i].toFixed(3)}</td>
                    <td class="py-2 text-green-400">${vMag[i].toFixed(3)}</td>
                    <td class="py-2 text-purple-400">${aMag[i].toFixed(3)}</td>
                `;
                tbody.appendChild(row);
            }
        }

        // Preset trajectories
        function loadPreset(type) {
            const presets = {
                helix: { x: 'cos(t)', y: 'sin(t)', z: '0.2*t', T: 20, N: 500 },
                lissajous: { x: 'sin(2*t)', y: 'sin(3*t)', z: 'sin(5*t)', T: 20, N: 1000 },
                torus: { x: '(3+cos(5*t))*cos(t)', y: '(3+cos(5*t))*sin(t)', z: 'sin(5*t)', T: 20, N: 1000 },
                rose: { x: 'cos(t)*cos(3*t)', y: 'sin(t)*cos(3*t)', z: 'sin(3*t)', T: 20, N: 1000 },
                damped: { x: 'exp(-0.1*t)*cos(t)', y: 'exp(-0.1*t)*sin(t)', z: '0.1*t', T: 30, N: 1000 },
                chaos: { x: 'sin(t)*(exp(cos(t))-2*cos(4*t)-sin(t/12)^5)', y: 'cos(t)*(exp(cos(t))-2*cos(4*t)-sin(t/12)^5)', z: 'sin(t/3)', T: 50, N: 2000 }
            };

            const p = presets[type];
            document.getElementById('inputX').value = p.x;
            document.getElementById('inputY').value = p.y;
            document.getElementById('inputZ').value = p.z;
            document.getElementById('inputT').value = p.T;
            document.getElementById('inputN').value = p.N;

            // Update active state
            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            calculateTrajectory();
        }

        // Reset view
        function resetView() {
            if (trajectoryData) {
                Plotly.relayout('trajectoryPlot', {
                    'scene.camera': { eye: { x: 1.5, y: 1.5, z: 1.2 } }
                });
            }
        }

        // Export data as JSON
        function exportData() {
            if (!trajectoryData) return;
            
            const dataStr = JSON.stringify(trajectoryData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'trajectory_data.json';
            link.click();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            Plotly.Plots.resize('trajectoryPlot');
            Plotly.Plots.resize('velocityPlot');
            Plotly.Plots.resize('accelerationPlot');
        });
    </script>
</body>
</html>
